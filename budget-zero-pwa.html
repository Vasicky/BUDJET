<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget Zéro">
<meta name="theme-color" content="#0a0f1e">
<title>Budget Zéro — Alassane</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #0a0f1e;
    --surface: #0f172a;
    --border: #1e293b;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #6366f1;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; overscroll-behavior: none;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── Header ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    color: #f1f5f9; letter-spacing: -0.5px;
  }
  #header p { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }

  /* ── KPIs ── */
  #kpis {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; padding: 12px 12px 0; flex-shrink: 0;
  }
  .kpi {
    background: var(--surface); border-radius: 10px;
    padding: 10px 10px; border: 1px solid var(--border);
  }
  .kpi-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .kpi-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; }

  /* ── Barre ── */
  #barre-wrap { padding: 10px 12px 4px; flex-shrink: 0; }
  #barre-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  #barre-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
  #barre-pct { font-size: 9px; color: var(--muted); text-align: right; margin-top: 3px; }

  /* ── Tabs ── */
  #tabs {
    display: flex; padding: 10px 12px 0; gap: 6px; flex-shrink: 0;
    overflow-x: auto; scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 6px 12px; border-radius: 20px; font-size: 11px;
    border: 1px solid var(--border); background: none; color: var(--muted);
    cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── Scroll content ── */
  #content {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    padding-bottom: calc(var(--safe-bot) + 70px);
    -webkit-overflow-scrolling: touch;
  }

  /* ── Section revenus / dépenses ── */
  .card {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
  }
  .card-header {
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .card-total { font-size: 13px; font-weight: 500; }
  .card-pct { font-size: 9px; color: var(--muted); margin-top: 1px; text-align: right; }

  /* ── Lignes ── */
  .ligne {
    display: flex; align-items: center; padding: 9px 14px; gap: 8px;
    border-bottom: 1px solid #0d1929;
  }
  .ligne:last-child { border-bottom: none; }
  .ligne-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; opacity: 0.6; }
  .ligne-label { flex: 1; font-size: 12px; color: #94a3b8; }
  .ligne-montant { font-size: 13px; color: var(--text); }
  .btn-del { background: none; border: none; color: #334155; font-size: 16px;
    line-height: 1; padding: 0 2px; cursor: pointer; flex-shrink: 0; }

  /* ── Bouton ajouter ── */
  .btn-add {
    margin: 8px 14px; background: none; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 6px; padding: 7px; font-size: 11px;
    width: calc(100% - 28px); cursor: pointer; font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }

  /* ── Modal édition ── */
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  #overlay.show { display: flex; }
  #modal {
    background: #131c2e; border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(var(--safe-bot) + 20px);
    width: 100%; max-width: 480px;
    border-top: 1px solid var(--border);
  }
  #modal h3 { font-family: 'Syne', sans-serif; font-size: 15px; color: var(--text); margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--border); border: 1px solid #2d3f55;
    color: var(--text); border-radius: 8px; padding: 11px 12px;
    font-size: 15px; font-family: 'DM Mono', monospace; outline: none;
    -webkit-appearance: none;
  }
  .field input:focus { border-color: var(--accent); }
  #modal-btns { display: flex; gap: 8px; }
  .btn-cancel {
    flex: 1; background: var(--border); border: none; color: var(--muted);
    border-radius: 10px; padding: 13px; font-size: 14px; cursor: pointer;
    font-family: 'DM Mono', monospace;
  }
  .btn-confirm {
    flex: 2; background: var(--accent); border: none; color: white;
    border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Syne', sans-serif;
  }

  /* ── Bottom nav ── */
  #nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 10px 0 calc(var(--safe-bot) + 10px);
    z-index: 50;
  }
  .nav-btn {
    flex: 1; background: none; border: none; color: var(--muted);
    font-size: 10px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; font-family: 'DM Mono', monospace;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn span:first-child { font-size: 20px; }

  /* ── Bilan tab ── */
  .bilan-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-bottom: 1px solid #0d1929;
    font-size: 13px;
  }
  .bilan-row:last-child { border-bottom: none; }
  .bilan-label { color: #94a3b8; font-size: 12px; }
  .bilan-val { font-weight: 500; }

  .solde-card {
    border-radius: 14px; padding: 20px; text-align: center;
    margin-bottom: 12px;
  }
  .solde-card .big { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; }
  .solde-card .sub { font-size: 11px; margin-top: 4px; opacity: 0.7; }

  /* ── Sauvegarde toast ── */
  #toast {
    position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%);
    background: var(--green); color: white; border-radius: 20px; padding: 8px 16px;
    font-size: 11px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  .tag-save {
    display: inline-block; font-size: 8px; background: #10b98120; color: var(--green);
    border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle;
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>💰 Budget Zéro <span class="tag-save" id="save-tag">● enregistré</span></h1>
    <p>ALASSANE · YVELINES · 2026 — Appuie sur une ligne pour modifier</p>
  </div>

  <div id="kpis">
    <div class="kpi">
      <div class="kpi-label">↑ Revenus</div>
      <div class="kpi-val" id="k-rev" style="color:#10b981">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">↓ Dépenses</div>
      <div class="kpi-val" id="k-dep" style="color:#6366f1">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">= Solde</div>
      <div class="kpi-val" id="k-sol">—</div>
    </div>
  </div>

  <div id="barre-wrap">
    <div id="barre-bg"><div id="barre-fill"></div></div>
    <div id="barre-pct"></div>
  </div>

  <div id="tabs"></div>

  <div id="content"></div>

  <div id="nav">
    <button class="nav-btn active" id="nav-budget" onclick="switchView('budget')">
      <span>📊</span><span>Budget</span>
    </button>
    <button class="nav-btn" id="nav-bilan" onclick="switchView('bilan')">
      <span>📈</span><span>Bilan</span>
    </button>
    <button class="nav-btn" id="nav-reset" onclick="resetConfirm()">
      <span>🔄</span><span>Reset</span>
    </button>
  </div>
</div>

<!-- Modal -->
<div id="overlay" onclick="closeModal(event)">
  <div id="modal">
    <h3 id="modal-title">Modifier</h3>
    <div class="field">
      <label>Libellé</label>
      <input type="text" id="modal-label" placeholder="Ex : Loyer">
    </div>
    <div class="field">
      <label>Montant (€)</label>
      <input type="number" id="modal-montant" placeholder="0" inputmode="decimal" min="0">
    </div>
    <div id="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="saveModal()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast">✓ Sauvegardé</div>

<script>
// ── Données initiales ──────────────────────────────────────────────────────
const DEFAULT_DATA = {
  revenus: [
    { id: "r1", label: "Salaire net de base", montant: 2750 },
    { id: "r2", label: "Indemnités repas/découche", montant: 200 },
    { id: "r3", label: "Allocations familiales (CAF)", montant: 840 },
  ],
  sections: [
    { id: "logement",    label: "Logement & Charges",        emoji: "🏠", color: "#f97316",
      lignes: [{ id:"l1", label:"Loyer", montant:993 }, { id:"l2", label:"Électricité / gaz / eau", montant:80 }, { id:"l3", label:"Internet + téléphone", montant:60 }] },
    { id: "alim",        label: "Alimentation",               emoji: "🛒", color: "#84cc16",
      lignes: [{ id:"a1", label:"Courses alimentaires", montant:500 }, { id:"a2", label:"Restaurants", montant:100 }] },
    { id: "transport",   label: "Transport",                  emoji: "🚗", color: "#06b6d4",
      lignes: [{ id:"t1", label:"Carburant / péages", montant:80 }, { id:"t2", label:"Entretien véhicule", montant:50 }] },
    { id: "assurances",  label: "Assurances & Abonnements",   emoji: "🛡️", color: "#a855f7",
      lignes: [{ id:"as1", label:"Assurance habitation", montant:25 }, { id:"as2", label:"Assurance voiture", montant:80 }, { id:"as3", label:"Mutuelle santé", montant:50 }, { id:"as4", label:"Streaming / divers", montant:30 }] },
    { id: "famille",     label: "Famille & Solidarité",       emoji: "❤️", color: "#ec4899",
      lignes: [{ id:"f1", label:"Transferts familiaux", montant:250 }] },
    { id: "dettes",      label: "Remboursement Dettes",       emoji: "📉", color: "#ef4444",
      lignes: [{ id:"d1", label:"Tontine mensuelle", montant:600 }, { id:"d2", label:"Crédit 1", montant:0 }, { id:"d3", label:"Crédit 2", montant:0 }, { id:"d4", label:"Amendes / Trésor Public", montant:0 }] },
    { id: "vie",         label: "Vie Courante & Loisirs",     emoji: "✨", color: "#f59e0b",
      lignes: [{ id:"v1", label:"Habillement / soins", montant:75 }, { id:"v2", label:"Loisirs / sorties", montant:25 }] },
    { id: "epargne",     label: "Épargne & Précaution",       emoji: "💰", color: "#10b981",
      lignes: [{ id:"e1", label:"Matelas de sécurité", montant:100 }, { id:"e2", label:"Épargne projet", montant:50 }] },
  ]
};

// ── État ───────────────────────────────────────────────────────────────────
let data = loadData();
let currentView = 'budget';
let currentTab = 'revenus';
let modalCtx = null; // { type: 'revenu'|'ligne'|'new_rev'|'new_ligne', secId, id }

function loadData() {
  try {
    const s = localStorage.getItem('budget_zero_v2');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData() {
  localStorage.setItem('budget_zero_v2', JSON.stringify(data));
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Calculs ────────────────────────────────────────────────────────────────
function totalRevenus() { return data.revenus.reduce((s, r) => s + r.montant, 0); }
function totalSection(sec) { return sec.lignes.reduce((s, l) => s + l.montant, 0); }
function totalDepenses() { return data.sections.reduce((s, sec) => s + totalSection(sec), 0); }

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}

// ── Render KPIs ────────────────────────────────────────────────────────────
function renderKPIs() {
  const rev = totalRevenus(), dep = totalDepenses(), sol = rev - dep;
  document.getElementById('k-rev').textContent = fmt(rev);
  document.getElementById('k-dep').textContent = fmt(dep);
  const ks = document.getElementById('k-sol');
  ks.textContent = fmt(sol);
  ks.style.color = sol === 0 ? '#10b981' : sol > 0 ? '#f59e0b' : '#ef4444';
  const pct = rev > 0 ? Math.min(100, (dep / rev) * 100) : 0;
  const fill = document.getElementById('barre-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 100 ? '#ef4444' : pct === 100 ? '#10b981' : '#6366f1';
  document.getElementById('barre-pct').textContent = pct.toFixed(1) + '% alloué';
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById('tabs');
  const allTabs = [
    { id: 'revenus', label: '💵 Revenus' },
    ...data.sections.map(s => ({ id: s.id, label: s.emoji + ' ' + s.label }))
  ];
  tabs.innerHTML = allTabs.map(t =>
    `<button class="tab ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id) {
  currentTab = id;
  renderTabs();
  renderContent();
}

// ── Render content ─────────────────────────────────────────────────────────
function renderContent() {
  if (currentView === 'bilan') { renderBilan(); return; }
  const c = document.getElementById('content');

  if (currentTab === 'revenus') {
    const rev = totalRevenus();
    c.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title" style="color:#10b981">💵 REVENUS MENSUELS</div>
          <div style="text-align:right">
            <div class="card-total" style="color:#10b981">${fmt(rev)}</div>
          </div>
        </div>
        ${data.revenus.map(r => `
          <div class="ligne" onclick="openModal('revenu','',${JSON.stringify(r.id)})">
            <div class="ligne-dot" style="background:#10b981"></div>
            <div class="ligne-label">${r.label}</div>
            <div class="ligne-montant" style="color:#10b981">${fmt(r.montant)}</div>
            <button class="btn-del" onclick="event.stopPropagation();deleteRevenu('${r.id}')">×</button>
          </div>
        `).join('')}
        <button class="btn-add" onclick="openModal('new_rev','','')">+ Ajouter un revenu</button>
      </div>`;
  } else {
    const sec = data.sections.find(s => s.id === currentTab);
    if (!sec) return;
    const tot = totalSection(sec);
    const rev = totalRevenus();
    const pct = rev > 0 ? (tot / rev * 100).toFixed(1) : '0.0';
    c.innerHTML = `
      <div class="card">
        <div class="card-header" style="border-bottom:1px solid ${sec.color}30">
          <div class="card-title" style="color:${sec.color}">${sec.emoji} ${sec.label.toUpperCase()}</div>
          <div style="text-align:right">
            <div class="card-total" style="color:${sec.color}">${fmt(tot)}</div>
            <div class="card-pct">${pct}% des revenus</div>
          </div>
        </div>
        ${sec.lignes.map(l => `
          <div class="ligne" onclick="openModal('ligne','${sec.id}',${JSON.stringify(l.id)})">
            <div class="ligne-dot" style="background:${sec.color}"></div>
            <div class="ligne-label">${l.label}</div>
            <div class="ligne-montant">${fmt(l.montant)}</div>
            <button class="btn-del" onclick="event.stopPropagation();deleteLigne('${sec.id}','${l.id}')">×</button>
          </div>
        `).join('')}
        <button class="btn-add" onclick="openModal('new_ligne','${sec.id}','')">+ Ajouter une ligne</button>
      </div>`;
  }
}

// ── Bilan ──────────────────────────────────────────────────────────────────
function renderBilan() {
  const rev = totalRevenus(), dep = totalDepenses(), sol = rev - dep;
  const solColor = sol === 0 ? '#10b981' : sol > 0 ? '#f59e0b' : '#ef4444';
  const solMsg = sol === 0 ? '🎯 Budget parfait !' : sol > 0 ? '💡 À réallouer dans une catégorie' : '🚨 Déficit — réduis une catégorie';

  const rows = data.sections.map(sec => {
    const t = totalSection(sec);
    const p = rev > 0 ? (t / rev * 100).toFixed(1) : '0.0';
    return `<div class="bilan-row">
      <div class="bilan-label">${sec.emoji} ${sec.label}</div>
      <div style="text-align:right">
        <div class="bilan-val" style="color:${sec.color}">${fmt(t)}</div>
        <div style="font-size:9px;color:var(--muted)">${p}%</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="solde-card" style="background:${solColor}15;border:1px solid ${solColor}40">
      <div class="big" style="color:${solColor}">${fmt(sol)}</div>
      <div class="sub" style="color:${solColor}">${solMsg}</div>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="bilan-row" style="font-weight:600">
        <div class="bilan-label">Total revenus</div>
        <div class="bilan-val" style="color:#10b981">${fmt(rev)}</div>
      </div>
      <div class="bilan-row" style="font-weight:600">
        <div class="bilan-label">Total dépenses</div>
        <div class="bilan-val" style="color:#6366f1">${fmt(dep)}</div>
      </div>
    </div>
    <div class="card">${rows}</div>
    <div style="text-align:center;font-size:9px;color:var(--muted);margin-top:12px">
      Données enregistrées sur cet appareil · Objectif solde = 0 €
    </div>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(type, secId, id) {
  modalCtx = { type, secId, id };
  let label = '', montant = '';

  if (type === 'revenu') {
    const r = data.revenus.find(x => x.id === id);
    label = r.label; montant = r.montant;
    document.getElementById('modal-title').textContent = '✏️ Modifier ce revenu';
  } else if (type === 'ligne') {
    const sec = data.sections.find(s => s.id === secId);
    const l = sec.lignes.find(x => x.id === id);
    label = l.label; montant = l.montant;
    document.getElementById('modal-title').textContent = '✏️ Modifier cette ligne';
  } else if (type === 'new_rev') {
    document.getElementById('modal-title').textContent = '➕ Nouveau revenu';
  } else if (type === 'new_ligne') {
    document.getElementById('modal-title').textContent = '➕ Nouvelle ligne';
  }

  document.getElementById('modal-label').value = label;
  document.getElementById('modal-montant').value = montant;
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('modal-montant').focus(), 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('show');
  modalCtx = null;
}

function saveModal() {
  if (!modalCtx) return;
  const label = document.getElementById('modal-label').value.trim();
  const montant = parseFloat(document.getElementById('modal-montant').value) || 0;
  if (!label) return;

  const { type, secId, id } = modalCtx;

  if (type === 'revenu') {
    data.revenus = data.revenus.map(r => r.id === id ? { ...r, label, montant } : r);
  } else if (type === 'ligne') {
    const sec = data.sections.find(s => s.id === secId);
    sec.lignes = sec.lignes.map(l => l.id === id ? { ...l, label, montant } : l);
  } else if (type === 'new_rev') {
    data.revenus.push({ id: 'r' + Date.now(), label, montant });
  } else if (type === 'new_ligne') {
    const sec = data.sections.find(s => s.id === secId);
    sec.lignes.push({ id: 'x' + Date.now(), label, montant });
  }

  document.getElementById('overlay').classList.remove('show');
  modalCtx = null;
  saveData();
  render();
}

function deleteRevenu(id) {
  if (data.revenus.length <= 1) return;
  data.revenus = data.revenus.filter(r => r.id !== id);
  saveData(); render();
}

function deleteLigne(secId, id) {
  const sec = data.sections.find(s => s.id === secId);
  if (sec.lignes.length <= 1) return;
  sec.lignes = sec.lignes.filter(l => l.id !== id);
  saveData(); render();
}

// ── Navigation ─────────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('tabs').style.display = v === 'budget' ? 'flex' : 'none';
  render();
}

function resetConfirm() {
  if (confirm('Remettre le budget aux valeurs initiales ?')) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); render();
  }
}

// ── Render global ──────────────────────────────────────────────────────────
function render() {
  renderKPIs();
  if (currentView === 'budget') { renderTabs(); renderContent(); }
  else renderBilan();
}

// ── Clavier modal ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('show')) saveModal();
  if (e.key === 'Escape') closeModal({ target: document.getElementById('overlay') });
});

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
